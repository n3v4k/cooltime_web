<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>쿨타임 로고 최종 시안</title>
  <desc>리퀴드 글라스 스타일이 반영된, 온도계 모양 시침·분침을 가진 시계 다이얼 앱 아이콘</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6fb8f9"/>
      <stop offset="100%" stop-color="#0d63c4"/>
    </linearGradient>
    <radialGradient id="bgSheen" cx="30%" cy="16%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rimLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="12%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dialGlass" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f2f9ff"/>
      <stop offset="100%" stop-color="#dceefc"/>
    </radialGradient>
    <linearGradient id="hourHand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9c85"/>
      <stop offset="100%" stop-color="#ee4726"/>
    </linearGradient>
    <linearGradient id="minuteHand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cc0fa"/>
      <stop offset="100%" stop-color="#0d63c4"/>
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#04306b" flood-opacity="0.35"/>
    </filter>
    <filter id="handShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0a2a55" flood-opacity="0.25"/>
    </filter>
    <clipPath id="squircleClip">
      <rect x="10" y="10" width="492" height="492" rx="112" ry="112"/>
    </clipPath>
    <clipPath id="dialClip">
      <circle cx="256" cy="256" r="168"/>
    </clipPath>
  </defs>

  <!-- 배경 스퀴클 -->
  <rect x="10" y="10" width="492" height="492" rx="112" ry="112" fill="url(#bg)" filter="url(#dropShadow)"/>

  <g clip-path="url(#squircleClip)">
    <rect x="10" y="10" width="492" height="492" fill="url(#bgSheen)"/>
    <rect x="10" y="10" width="492" height="180" fill="url(#rimLight)"/>
  </g>
  <rect x="11" y="11" width="490" height="490" rx="111" ry="111" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- 시계 다이얼: 유리 질감 -->
  <circle cx="256" cy="256" r="172" fill="#0a4f9e" opacity="0.25"/>
  <circle cx="256" cy="256" r="168" fill="url(#dialGlass)"/>
  <g clip-path="url(#dialClip)">
    <ellipse cx="205" cy="180" rx="120" ry="60" fill="#ffffff" opacity="0.5"/>
  </g>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="3"/>

  <g stroke="#bcdcff" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="106" x2="256" y2="128"/>
    <line x1="256" y1="384" x2="256" y2="406"/>
    <line x1="106" y1="256" x2="128" y2="256"/>
    <line x1="384" y1="256" x2="406" y2="256"/>
  </g>

  <!-- 시침: 온도계 모양 + 눈금 + 유리 하이라이트, 코랄 -->
  <g transform="rotate(-40 256 256)" filter="url(#handShadow)">
    <rect x="242" y="150" width="28" height="112" rx="14" fill="url(#hourHand)"/>
    <rect x="245" y="154" width="7" height="100" rx="3.5" fill="#ffffff" opacity="0.35"/>
    <g stroke="#ffffff" stroke-opacity="0.8" stroke-width="2" stroke-linecap="round">
      <line x1="270" y1="164" x2="261" y2="164"/>
      <line x1="270" y1="178" x2="261" y2="178"/>
      <line x1="270" y1="192" x2="261" y2="192"/>
      <line x1="270" y1="206" x2="261" y2="206"/>
      <line x1="270" y1="220" x2="261" y2="220"/>
      <line x1="270" y1="234" x2="261" y2="234"/>
      <line x1="270" y1="248" x2="261" y2="248"/>
    </g>
  </g>

  <!-- 분침: 온도계 모양 + 눈금 + 유리 하이라이트, 파랑 -->
  <g transform="rotate(70 256 256)" filter="url(#handShadow)">
    <rect x="245" y="90" width="22" height="172" rx="11" fill="url(#minuteHand)"/>
    <rect x="248" y="94" width="6" height="160" rx="3" fill="#ffffff" opacity="0.35"/>
    <g stroke="#ffffff" stroke-opacity="0.8" stroke-width="2" stroke-linecap="round">
      <line x1="267" y1="104" x2="260" y2="104"/>
      <line x1="267" y1="118" x2="260" y2="118"/>
      <line x1="267" y1="132" x2="260" y2="132"/>
      <line x1="267" y1="146" x2="260" y2="146"/>
      <line x1="267" y1="160" x2="260" y2="160"/>
      <line x1="267" y1="174" x2="260" y2="174"/>
      <line x1="267" y1="188" x2="260" y2="188"/>
      <line x1="267" y1="202" x2="260" y2="202"/>
      <line x1="267" y1="216" x2="260" y2="216"/>
      <line x1="267" y1="230" x2="260" y2="230"/>
      <line x1="267" y1="244" x2="260" y2="244"/>
    </g>
  </g>

  <!-- 중심 온도계 구슬(bulb) -->
  <circle cx="256" cy="256" r="26" fill="url(#hourHand)" filter="url(#handShadow)"/>
  <circle cx="250" cy="249" r="9" fill="#ffffff" fill-opacity="0.55"/>
</svg>
