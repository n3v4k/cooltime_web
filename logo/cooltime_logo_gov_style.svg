<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>쿨타임 로고 - 정부 아이콘 디자인 언어 적용</title>
  <desc>대한민국 정부 픽토그램 스타일의 플랫하고 단순한 온도계 시침·분침 시계 다이얼 아이콘</desc>

  <!-- 배경: 단색 플랫, 정부 상징색 계열 블루 -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#003C7A"/>

  <!-- 다이얼: 플랫 화이트 원 + 얇은 링 -->
  <circle cx="256" cy="256" r="176" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#003C7A" stroke-width="6"/>

  <!-- 시각 눈금: 12/3/6/9시, 굵고 단순하게 -->
  <g fill="#003C7A">
    <rect x="248" y="96" width="16" height="28" rx="4"/>
    <rect x="248" y="388" width="16" height="28" rx="4"/>
    <rect x="96" y="248" width="28" height="16" rx="4"/>
    <rect x="388" y="248" width="28" height="16" rx="4"/>
  </g>

  <!-- 시침: 온도계 모양, 플랫 레드 -->
  <g transform="rotate(-40 256 256)">
    <rect x="240" y="146" width="32" height="118" rx="16" fill="#D8362B"/>
    <g fill="#FFFFFF">
      <rect x="260" y="160" width="9" height="9"/>
      <rect x="260" y="176" width="9" height="9"/>
      <rect x="260" y="192" width="9" height="9"/>
      <rect x="260" y="208" width="9" height="9"/>
      <rect x="260" y="224" width="9" height="9"/>
      <rect x="260" y="240" width="9" height="9"/>
    </g>
  </g>

  <!-- 분침: 온도계 모양, 플랫 블루 -->
  <g transform="rotate(70 256 256)">
    <rect x="243" y="84" width="26" height="178" rx="13" fill="#0F62C7"/>
    <g fill="#FFFFFF">
      <rect x="259" y="98" width="7" height="9"/>
      <rect x="259" y="114" width="7" height="9"/>
      <rect x="259" y="130" width="7" height="9"/>
      <rect x="259" y="146" width="7" height="9"/>
      <rect x="259" y="162" width="7" height="9"/>
      <rect x="259" y="178" width="7" height="9"/>
      <rect x="259" y="194" width="7" height="9"/>
      <rect x="259" y="210" width="7" height="9"/>
      <rect x="259" y="226" width="7" height="9"/>
      <rect x="259" y="242" width="7" height="9"/>
    </g>
  </g>

  <!-- 중심 온도계 구슬(bulb): 플랫 레드 -->
  <circle cx="256" cy="256" r="28" fill="#D8362B"/>
  <circle cx="256" cy="256" r="10" fill="#FFFFFF"/>
</svg>
